<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ledry Bridge</title>
    <style>
      body { font: 15px system-ui; max-width: 560px; margin: 48px auto; padding: 0 24px; color: #17212b; }
      label { display: block; margin: 18px 0 6px; font-weight: 650; }
      input { box-sizing: border-box; width: 100%; padding: 10px; border: 1px solid #9aa5b1; border-radius: 7px; }
      button { margin-top: 20px; padding: 10px 18px; border: 0; border-radius: 7px; background: #166534; color: white; font-weight: 700; }
      #status { margin-left: 12px; color: #166534; }
      code { background: #eef2f6; padding: 2px 5px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>Connect Ledry</h1>
    <p>Run <code>ledry pair</code>, then paste the local token below. The token never leaves this computer.</p>
    <p>Open a source tab, click the Ledry toolbar icon, choose the tab, and allow its origin. Then open the side panel. Only approved tabs are visible to the CLI.</p>
    <form id="settings">
      <label for="port">Local port</label>
      <input id="port" type="number" min="1024" max="65535" value="43110" required>
      <label for="token">Pairing token</label>
      <input id="token" type="password" minlength="16" autocomplete="off" required>
      <button type="submit">Save and connect</button><span id="status"></span>
    </form>
    <script type="module" src="dist/options.js"></script>
  </body>
</html>
